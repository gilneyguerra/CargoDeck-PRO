name: Security Scan

on:
  push:
    branches: [ main, master, feat/* ]
  pull_request:
    branches: [ main, master ]

jobs:
  security-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        # v5 (ago/2025) roda em Node.js 24 — atualizado em razão da
        # deprecação do Node.js 20 nos runners do GitHub Actions
        # (https://github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners/).
        uses: actions/checkout@v5

      - name: Setup Node.js
        # v5 (ago/2025) também roda em Node.js 24 internamente.
        uses: actions/setup-node@v5
        with:
          node-version: 24

      - name: Install Dependencies
        run: npm ci

      - name: Static Analysis (ESLint Security)
        run: npm run lint

      - name: Dependency Check (npm audit)
        run: npm audit --audit-level=high

      - name: Run Secret Scanner (TruffleHog)
        # Pin em tag versionada (era @main — referência mutável, vetor de
        # supply-chain attack se a branch principal do repo for comprometida).
        uses: trufflesecurity/trufflehog@v3.90.5
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --debug --only-verified
